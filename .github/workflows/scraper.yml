name: ESIC Circular Monitor

on:
  schedule:
    - cron: '0,30 2-15 * * 1-6'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    concurrency:
      group: esic-monitor
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 supabase==1.2.0 python-telegram-bot python-dotenv google-generativeai pymupdf

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          python scraper/runner.py
          if [ "$(date -u +%H:%M)" = "03:30" ]; then
            python failsafe/health.py
          fi

      - name: Keep repo active
        continue-on-error: true
        run: |
          echo "Last run: $(date)" > last_run.txt
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add last_run.txt
          git diff --staged --quiet || git commit -m "chore: keep alive"
          git pull --rebase origin main
          git push